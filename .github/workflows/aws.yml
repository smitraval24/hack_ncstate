# Deploy to Amazon ECS on push to main.

name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: creamandonion
  ECS_SERVICE: cream-task-service
  ECS_CLUSTER: creamandonion
  ECS_TASK_DEFINITION: .aws/cream-task.json
  CONTAINER_NAME: cream-container

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract fault codes from commit
      id: faults
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B)
        CODES=$(echo "$COMMIT_MSG" | grep -oP '\[FAULT:\K[A-Z_]+(?=\])' | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))' || echo '[]')
        echo "fault_codes=$CODES" >> $GITHUB_OUTPUT
        echo "has_faults=$([ "$CODES" != "[]" ] && echo true || echo false)" >> $GITHUB_OUTPUT

    # Build both images in parallel using Docker Buildx bake
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push app image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --target app \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          . &
        docker build \
          --cache-from type=registry,ref=$ECR_REGISTRY/mock-api:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t $ECR_REGISTRY/mock-api:latest \
          -f Dockerfile.mock_api . &
        wait
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG &
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest &
        docker push $ECR_REGISTRY/mock-api:latest &
        wait
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      id: build-image

    - name: Render ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}
        environment-variables: |
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          BUILD_SHA=${{ github.sha }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: false

    - name: Wait for live app to serve the new build
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        EXPECTED_SHA: ${{ github.sha }}
      run: |
        APP_BASE="${DASHBOARD_URL%/}"
        BUILD_URL="$APP_BASE/up/build"
        for attempt in $(seq 1 45); do
          RESPONSE=$(curl -fsS "$BUILD_URL" || true)
          LIVE_SHA=$(printf '%s' "$RESPONSE" | jq -r '.build_sha // empty' 2>/dev/null || true)
          if [ "$LIVE_SHA" = "$EXPECTED_SHA" ]; then
            echo "Live app is serving build $LIVE_SHA"
            exit 0
          fi
          echo "Waiting for build $EXPECTED_SHA at $BUILD_URL (attempt $attempt/45, saw '${LIVE_SHA:-none}')"
          sleep 5
        done
        echo "Timed out waiting for the live app to serve build $EXPECTED_SHA"
        exit 1

    # Notify dashboard only after the live app serves the new build SHA.
    - name: Notify dashboard - deploy success
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      run: |
        FAULT_CODES='${{ steps.faults.outputs.fault_codes }}'
        if [ "$FAULT_CODES" = "[]" ] || [ -z "$FAULT_CODES" ]; then
          echo "No fault-tagged remediation commit detected; skipping dashboard callback."
          exit 0
        fi
        ENDPOINT="$DASHBOARD_URL/developer/incidents/pipeline/callback"
        BODY="{\"fault_codes\":$FAULT_CODES,\"status\":\"success\",\"commit_sha\":\"${{ github.sha }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        curl -s -o /dev/null -w "HTTP %{http_code}" -X POST "$ENDPOINT" \
          -H "Content-Type: application/json" -d "$BODY" || true

    # Cleanup old task defs in background (non-blocking)
    - name: Cleanup old task definition revisions
      run: |
        FAMILY_NAME=$(jq -r '.family' ${{ env.ECS_TASK_DEFINITION }})
        TASK_DEFS=$(aws ecs list-task-definitions --family-prefix $FAMILY_NAME --sort DESC --query 'taskDefinitionArns[3:]' --output text 2>/dev/null)
        for TD in $TASK_DEFS; do
          aws ecs deregister-task-definition --task-definition $TD --no-cli-pager > /dev/null 2>&1 &
        done
        wait

  notify-failure:
    name: Notify deploy failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Notify dashboard - deploy failed
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      run: |
        CODES=$(git log -1 --pretty=%B | grep -oP '\[FAULT:\K[A-Z_]+(?=\])' | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))' || echo '[]')
        [ "$CODES" = "[]" ] && exit 0
        curl -sf -X POST "$DASHBOARD_URL/developer/incidents/pipeline/callback" \
          -H "Content-Type: application/json" \
          -d "{\"fault_codes\":$CODES,\"status\":\"failure\",\"commit_sha\":\"${{ github.sha }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
