# Deploy to Amazon ECS on push to main.

name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: creamandonion
  ECS_SERVICE: cream-task-service
  ECS_CLUSTER: creamandonion
  ECS_TASK_DEFINITION: .aws/cream-task.json
  CONTAINER_NAME: cream-container

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract fault codes from commit
      id: faults
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B)
        CODES=$(echo "$COMMIT_MSG" | grep -oP '\[FAULT:\K[A-Z_]+(?=\])' | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))' || echo '[]')
        echo "fault_codes=$CODES" >> $GITHUB_OUTPUT
        echo "has_faults=$([ "$CODES" != "[]" ] && echo true || echo false)" >> $GITHUB_OUTPUT

    # Build both images in parallel using Docker Buildx bake
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push app image
      uses: docker/build-push-action@v6
      with:
        context: .
        target: app
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
        cache-from: type=gha,scope=app
        cache-to: type=gha,mode=max,scope=app

    - name: Set image output
      id: build-image
      run: echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Render ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}
        environment-variables: |
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          BUILD_SHA=${{ github.sha }}
          FAULT_VERIFY_BASE_URL=${{ secrets.DASHBOARD_URL }}

    - name: Ensure service is scaled up
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --desired-count 1 --region ${{ env.AWS_REGION }} --no-cli-pager > /dev/null

    - name: Deploy Amazon ECS task definition
      id: deploy
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
        wait-for-minutes: 7

    - name: Wait for newest ECS build to serve traffic
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        EXPECTED_BUILD_SHA: ${{ github.sha }}
      run: |
        if [ -z "$DASHBOARD_URL" ]; then
          echo "DASHBOARD_URL secret is required to verify the latest ECS build."
          exit 1
        fi

        deadline=$((SECONDS + 60))
        while [ $SECONDS -lt $deadline ]; do
          payload=$(curl -fsS "$DASHBOARD_URL/up/build" || true)
          live_sha=$(printf '%s' "$payload" | jq -r '.build_sha // empty' 2>/dev/null || true)

          if [ "$live_sha" = "$EXPECTED_BUILD_SHA" ]; then
            echo "Latest ECS build is live: $live_sha"
            exit 0
          fi

          echo "Waiting for newest ECS build. Expected $EXPECTED_BUILD_SHA, got ${live_sha:-<none>}."
          sleep 10
        done

        echo "Newest ECS build did not become live within the 8 minute rollout budget."
        exit 1

    # Notify dashboard after the new task is running.
    - name: Notify dashboard - deploy success
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      run: |
        FAULT_CODES='${{ steps.faults.outputs.fault_codes }}'
        if [ "$FAULT_CODES" = "[]" ] || [ -z "$FAULT_CODES" ]; then
          echo "No fault-tagged remediation commit detected; skipping dashboard callback."
          exit 0
        fi
        ENDPOINT="$DASHBOARD_URL/developer/incidents/pipeline/callback"
        BODY="{\"fault_codes\":$FAULT_CODES,\"status\":\"success\",\"commit_sha\":\"${{ github.sha }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        curl -s -o /dev/null -w "HTTP %{http_code}" -X POST "$ENDPOINT" \
          -H "Content-Type: application/json" -d "$BODY" || true

    # Cleanup old task defs in background (non-blocking)
    - name: Cleanup old task definition revisions
      run: |
        FAMILY_NAME=$(jq -r '.family' ${{ env.ECS_TASK_DEFINITION }})
        TASK_DEFS=$(aws ecs list-task-definitions --family-prefix $FAMILY_NAME --sort DESC --query 'taskDefinitionArns[3:]' --output text 2>/dev/null)
        for TD in $TASK_DEFS; do
          aws ecs deregister-task-definition --task-definition $TD --no-cli-pager > /dev/null 2>&1 &
        done
        wait

  notify-failure:
    name: Notify deploy failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Notify dashboard - deploy failed
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      run: |
        CODES=$(git log -1 --pretty=%B | grep -oP '\[FAULT:\K[A-Z_]+(?=\])' | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))' || echo '[]')
        [ "$CODES" = "[]" ] && exit 0
        curl -sf -X POST "$DASHBOARD_URL/developer/incidents/pipeline/callback" \
          -H "Content-Type: application/json" \
          -d "{\"fault_codes\":$CODES,\"status\":\"failure\",\"commit_sha\":\"${{ github.sha }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
